# configs/mt5_large.yaml
# Configuration for google/mt5-large — requires ≥14 GB VRAM (A100 recommended)
# Reduce per_device_train_batch_size to 4 if OOM on T4

model_name: "google/mt5-large"
experiment_name: "exp09_mt5large_lora_r16_subsetprompt"

max_input_length: 128
max_target_length: 384

num_train_epochs: 5
per_device_train_batch_size: 4
per_device_eval_batch_size: 4
gradient_accumulation_steps: 8
learning_rate: 0.0003
warmup_ratio: 0.06
weight_decay: 0.01
lr_scheduler_type: "cosine"
label_smoothing_factor: 0.1
early_stopping_patience: 2
seed: 42

use_peft: true
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules: ["q", "v"]

num_beams: 4
no_repeat_ngram_size: 3

data_dir: "data"
output_dir: "outputs"
submission_dir: "outputs/submissions"
reports_dir: "reports"

logging_steps: 100
report_to: "none"
dataloader_num_workers: 0
